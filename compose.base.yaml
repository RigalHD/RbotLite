services:
  db:
    container_name: rbot-lite-postgres
    image: postgres:17-alpine
    restart: unless-stopped
    expose:
      - 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USERNAME -d $$POSTGRES_DATABASE"]
      interval: 10s
      timeout: 5s
      retries: 5

  discord-bot:
    container_name: rbot-lite
    build:
      context: .
    restart: unless-stopped
    command: [ "rbot", "run", "bot" ]
    depends_on:
      db:
        condition: service_healthy
