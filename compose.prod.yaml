services:
  db:
    extends:
      file: compose.base.yaml
      service: db
    env_file:
      - "./.config/prod/.env.prod"
    volumes:
      - db-data:/var/lib/postgresql/data

  discord-bot:
    extends:
      file: compose.base.yaml
      service: discord-bot
    env_file:
      - "./.config/prod/.env.prod"

volumes:
  db-data:
